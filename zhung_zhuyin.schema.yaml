# Rime schema
# encoding: utf-8

schema:
  schema_id: zhung_zhuyin
  name: 中州注音法
  version: "0.5"
  author:
    - 佛振 <chen.sst@gmail.com>
  description: |
    老派鄭州話
    以注音符號錄入！

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
    abbrev: [ 中, Ａ ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    states: [ 漢字, 汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - fluency_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

menu:
  alternative_select_labels: ['⇧1', '⇧2', '⇧3', '⇧4', '⇧5', '⇧6', '⇧7', '⇧8', '⇧9', '⇧0']

speller:
  alphabet: '1qaz`2wsxedcrfv5tgbyhnujm8ik,9ol.0p;/- 6347'
  initials: '1qaz`2wsxedcrfv5tgbyhnujm8ik,9ol.0p;/-'
  finals: " 6347"
  delimiter: "'"
  use_space: true
  algebra:
    - xform/^yi?/i/
    - xform/^wu?/u/
    - xform/^([jqx])([^i])/$1i$2/
    - xform/ui/uei/
    - xform/([iu])n/$1en/
    - xform/^zhy?/Z/
    - xform/^chy?/C/
    - xform/^shy?/S/
    - xform/^rhy?/R/
    - xform/^([zcs])y/$1/
    - xform/iu/Y/
    - xform/eo/O/
    - xform/ai/I/
    - xform/ei/E/
    - xform/au/A/
    - xform/ou/U/
    - xform/ang/K/
    - xform/eng/G/
    - xform/an/M/
    - xform/en/N/
    - xform/el/L/
    - xform/([aoAU])l/$1L/
    - derive/^(u\d?)$/v$1/
    - derive/^u([aAMNK])/v$1/
    - abbrev/^([bpmfvdtnlgkhjqxZCSRzcs]).+$/$1/
    - derive/^([A-Za-z]+)\d$/$1/
    - derive/^([jqx])i([A-Za-z])/$1$2/
    - derive/[12]$/5/
    - 'xlit|bpmfvdtnlgkhjqxZCSRzcsiuYaoOeIEAUMNKGL12345|1qaz`2wsxedcrfv5tgbyhnujm8ik,9ol.0p;/- 6347|'

translator:
  dictionary: zhung
  prism: zhung_zhuyin
  preedit_format:
    - 'xlit|1qaz`2wsxedcrfv5tgbyhnujm8ik,9ol.0p;/- 6347''|ㄅㄆㄇㄈㄪㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒㄓㄔㄕㄖㄗㄘㄙㄧㄨㄩㄚㄛㄜㄝㄞㄟㄠㄡㄢㄣㄤㄥㄦˊˋˆˇ˙ |'

punctuator:
  full_shape:
    " " : { commit: "　" }
    "<" : { commit: "，" }
    ">" : { commit: "。" }
    "?" : [ ？, ／, ÷ ]
    ":" : [ ：, ； ]
    "'" : { pair: [ "‘", "’" ] }
    "\"" : { pair: [ "“", "”" ] }
    "\\" : [ 、, ＼ ]
    "|" : [ ·, ｜, "§", "¦" ]
    "`" : ｀
    "~" : ～
    "!" : { commit: ！ }
    "@" : [ ＠, ☯ ]
    "#" : [ ＃, ⌘ ]
    "%" : [ ％, "°", "℃" ]
    "$" : [ ￥, "$", "€", "£", "¥", "¢", "¤" ]
    "^" : { commit: …… }
    "&" : ＆
    "*" : [ ＊, ·, ・, ×, ※, ❂ ]
    "(" : （
    ")" : ）
    "_" : [ ——, － ]
    "+" : ＋
    "=" : ＝
    "[" : [ 「, 【, 《, 〔, ［ ]
    "]" : [ 」, 】, 》, 〕, ］ ]
    "{" : [ 『, 〖, 〈, ｛ ]
    "}" : [ 』, 〗, 〉, ｝ ]
  half_shape:
    "<" : { commit: "，" }
    ">" : { commit: "。" }
    "?" : [ ？, ／, "/", ÷ ]
    ":" : [ ：, ； ]
    "'" : { pair: [ "‘", "’" ] }
    "\"" : { pair: [ "“", "”" ] }
    "\\" : [ 、, "\\", ＼ ]
    "|" : [ ·, "|", ｜, "§", "¦" ]
    "`" : "`"
    "~" : "~"
    "!" : { commit: ！ }
    "@" : { commit: "@" }
    "#" : { commit: "#" }
    "%" : [ "%", ％, "°", "℃" ]
    "$" : [ ￥, "$", "€", "£", "¥", "¢", "¤" ]
    "^" : { commit: …… }
    "&" : { commit: "&" }
    "*" : [ "*", ＊, ·, ・, ×, ※, ❂ ]
    "(" : { commit: （ }
    ")" : { commit: ） }
    "_" : [ ——, －, "-" ]
    "+" : "+"
    "=" : "="
    "[" : [ 「, 【, 《, 〔, ［ ]
    "]" : [ 」, 】, 》, 〕, ］ ]
    "{" : [ 『, 〖, 〈, ｛ ]
    "}" : [ 』, 〗, 〉, ｝ ]

editor:
  bindings:
    space: toggle_selection
    Tab: toggle_selection

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: comma, send: comma }      # ㄝ
    - { when: has_menu, accept: period, send: period }    # ㄡ
    - { when: has_menu, accept: minus, send: minus }      # ㄦ
    - { when: paging, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: has_menu, accept: Shift+exclam, send: KP_1 }
    - { when: has_menu, accept: Shift+at, send: KP_2 }
    - { when: has_menu, accept: Shift+numbersign, send: KP_3 }
    - { when: has_menu, accept: Shift+dollar, send: KP_4 }
    - { when: has_menu, accept: Shift+percent, send: KP_5 }
    - { when: has_menu, accept: Shift+asciicircum, send: KP_6 }
    - { when: has_menu, accept: Shift+ampersand, send: KP_7 }
    - { when: has_menu, accept: Shift+asterisk, send: KP_8 }
    - { when: has_menu, accept: Shift+parenleft, send: KP_9 }
    - { when: has_menu, accept: Shift+parenright, send: KP_0 }
    # 字形轉換
    - { when: always, accept: Control+Shift+4, toggle: zh_hans }
    - { when: always, accept: Control+Shift+dollar, toggle: zh_hans }

recognizer:
  patterns:
    email: "^[a-z][-_.0-9a-z]*@.*$"
    uppercase: "^[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"

__patch:
  # 使用八股文語言模型
  - grammar:/hant?
  # 用家自選配置
  - zhung_zhuyin.custom:/patch?
