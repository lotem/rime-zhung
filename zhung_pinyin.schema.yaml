    # 兼容尖音拼寫，與舌尖元音混淆時韻母 i 拼作 -yi（如 zi -> zyi 即）
    - xform/^([zcs])i(\d?)$/$1yi$2/
    # 支持與尖音混淆時的強調形式 ï，鍵盤輸入 ii（如 sy -> sii）
    - xform/([zcsr]h?)y(\d?)$/$1ii$2/
    # 兼容撮口介音拼寫為 -yu 或 v（如 ziu -> zyu / zv 聚、俗）
    #- xform/^([zcsnl])iu/$1yu/
    - xform/^([zcsnl])iu/$1v/
    # 補全團音後省略的介音 i
    - xform/^([jqx])([aeo])/$1i$2/
    # 元音 ㄜ (eo) 與 ㄝ (e) 的對立變換
    # 韻母 ê 在無介音時，爲避免與 e 混淆，鍵盤輸入 ee（如 ge -> gee 革）
    - xform/^([bpfmvdtnlgkhr]|[zcs]h?)e(\d?)$/$1ee$2/
    - derive/^e(\d?)$/ee$1/
    # 中州羅馬字的 eo (ㄜ) 映射爲漢語拼音的 e
    - derive/eo/e/
    # 允許以完整形式 iou 出現（如 ziou 就）
    #- xform/iou/iu/
    # 零聲母 ui, un 還原爲拼音的 wei, wen
    - xform/^wui/wei/
    - xform/^wun/wen/
    # 顯示中原官話調號，優雅美觀
    - xform ([aeiou])(r|ng?)([1234]) $1$3$2
    - xform ([aeo])([iou])([1234]) $1$3$2
    - xform a1 á
    - xform a2 à
    - xform a3 â
    - xform a4 ǎ
    - xform ee1 ë́
    - xform ee2 ë̀
    - xform ee3 ë̂
    - xform ee4 ë̌
    - xform ee ë
    - xform e1 é
    - xform e2 è
    - xform e3 ê
    - xform e4 ě
    - xform o1 ó
    - xform o2 ò
    - xform o3 ô
    - xform o4 ǒ
    - xform ii1 ḯ
    - xform ii2 ï̀
    - xform ii3 ï̂
    - xform ii4 ï̌
    - xform ii ï
    - xform i1 í
    - xform i2 ì
    - xform i3 î
    - xform i4 ǐ
    - xform u1 ú
    - xform u2 ù
    - xform u3 û
    - xform u4 ǔ
    - xform v1 ǘ
    - xform v2 ǜ
    - xform v3 ü̂
    - xform v4 ǚ

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"

__patch:
  # 使用八股文語言模型
  - grammar:/hant?
  # 用家自選配置
  - zhung_pinyin.custom:/patch?
