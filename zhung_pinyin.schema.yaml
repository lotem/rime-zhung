# Rime schema
# encoding: utf-8

schema:
  schema_id: zhung_pinyin
  name: 中原話增補拼音
  version: '0.2'
  author:
    - 居戎氏
  description: |
    中原官話·鄭州老派口音
    增補《漢語拼音》輸入方案
    底層適配中州羅馬字詞典
  dependencies:
    - stroke

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
    abbrev: [ 中, Ａ ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    states: [ 漢字, 汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: 'abcdefghijklmnopqrstuvwxyz'
  delimiter: " '"
  algebra:
    __patch:
      - zhuan_pinyin:/zhuan_pinyin
      - zhuan_pinyin:/pinyin_shuru

translator:
  dictionary: zhung
  prism: zhung_pinyin
  preedit_format:
    __patch:
      - zhuan_pinyin:/xanshy_shengdiau
  comment_format:
    __patch:
      - zhuan_pinyin:/xanshy_pinyin
      - zhuan_pinyin:/xanshy_shengdiau

reverse_lookup:
  dictionary: stroke
  enable_completion: true
  prefix: "`"
  suffix: "'"
  tips: 〔筆畫〕
  preedit_format:
    - xlit/hspnz/一丨丿丶乙/
  comment_format:
    __patch:
      - zhuan_pinyin:/xanshy_pinyin
      - zhuan_pinyin:/xanshy_shengdiau

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"

__patch:
  # 使用八股文語言模型
  - grammar:/hant?
  # 用家自選配置
  - zhung_pinyin.custom:/patch?
