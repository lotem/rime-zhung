# Rime schema
# encoding: utf-8

schema:
  schema_id: zhung_combo
  name: 中州並擊法
  version: "0.5"
  author:
    - 佛振 <chen.sst@gmail.com>
  description: |
    宮保拼音七指禪指法
    並擊輸入老派鄭州話

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
    abbrev: [ 中, Ａ ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    states: [ 漢字, 汉字 ]

engine:
  processors:
    - ascii_composer
    - chord_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcba'"
  initials: "zyxwvutsrqponmlkjihgfedcba"
  finals: "'"
  delimiter: " "
  algebra:
    - xform/^([A-Za-z]+)\d$/$1/
    #- derive/^yi?/i/
    #- derive/^wu?/u/
    - derive/^wu/vu/
    - derive/^([vw])u([in])/$1e$2/
    - derive/^([jqx])([^i])/$1i$2/
    - derive/ui/uei/
    - derive/([iu])n/$1en/
    #- derive/^([zcsr]h?)y/$1/
    - derive/^rh/r/
    - derive/^w(a|au|ang?|en)/v$1/
    # 音節一律後加隔音符號，避免音節切分歧義
    - "xform/^([a-z]+)$/$1'/"

chord_composer:
  alphabet: 'swxdecfrvgtbjum kilo'
  algebra:
    - 'xlit|swxdecfrvgtbjum kilo|sczhlfgdbktpiuVaNLeo|'
    - 'xform/^a$/ /'
    - xform/^zfb/v/
    - xform/^zf/zh/
    - xform/^cl/ch/
    - xform/^fb/m/
    - xform/^ld/n/
    - xform/^shg(.+)$/$1/
    - xform/^hg/rh/
    - xform/^g([iV])/j$1/
    - xform/^k([iV])/q$1/
    - xform/^h([iV])/x$1/
    - xform/ae$/a/
    - xform/(ua?)Lo$/$1Ne/
    - xform/iLo$/VNe/
    - xform/aL$/ai/
    - xform/ao$/au/
    - xform/Lo$/ou/
    - xform/uL$/ui/
    - xform/iL$/iou/
    - xform/^([zcsr]h?)L$/$1y/
    - xform/^L$/el/
    - xform/Le?$/ei/
    - xform/([aiuV])Ne$/$1ng/
    - xform/Ne$/eng/
    - xform/([aiuV])N$/$1n/
    - xform/N$/en/
    - xform/io$/iuo/
    - xform/^([bpmfv])o$/$1uo/
    - xform/^([dtnlgkh]|[zcsr]h?)o$/$1eo/
    - xform/^o$/eo/
    - xform/^i(ng?)$/yi$1/
    - xform/^i$/yi/
    - xform/^i/y/
    - xform/^u(i|ng?)$/wu$1/
    - xform/^u$/wu/
    - xform/^u/w/
    - xform/^V/yu/
    - xform/V/iu/
    - xform/^([jqx])i([aoeu])/$1$2/
    - xform/^([zcsr]h)i$/$1y/
    - xform/^([zcsr]h)i([aoeu])/$1$2/
    - xform/^([zcsr]h)i(ng?)$/$1e$2/
    - xform/^([bpmfv])$/$1u/
    - xform/^([dtnl])$/$1i/
    - xform/^([gkh])$/$1eo/
    - xform/^([zcsr]h?)$/$1y/
  output_format:
    - "xform/^([bpmfv])([iu]|i?[ae]|uo|[ae]i|i?[ao]u|[ei]n|i?an|ang|[ei]ng)$/$1$2'/"
    - "xform/^([dtnl])(i|i?u|i?[ae]|[eu]o|iu[eo]|[aeu]i|i?[ao]u|i?u?an|[ei]n|i?un|i?ang|[ei]ng|i?ung)$/$1$2'/"
    - "xform/^([gkh])(u|u?[ae]|[eu]o|u?ai|[eu]i|[ao]u|u?an|[eu]n|u?ang|[eu]ng)$/$1$2'/"
    - "xform/^([jqx]|[zcs]i?)([iu]|u?[ae]|uo|ai|u?[ao]u|u?an|[iu]n|[aiu]ng)$/$1$2'/"
    - "xform/^([zcsr]h?)([yu]|u?[ae]|[eu]o|u?ai|[eu]i|u?[ao]u|u?an|[eu]n|u?ang|[eu]ng)$/$1$2'/"
    - "xform/^(y?)([aeo]|[ae]i|[ao]u|[aeiu]ng?)$/$1$2'/"
    - "xform/^(yu|w)([aeo]|[au]i|[ao]u|[au]ng?)$/$1$2'/"
    - "xform/^(eo|el|yi|wu|yu)$/$1'/"
    - "erase/^([A-Za-z]+)$/"
  prompt_format:
    - "xform/^(.*)$/[$1]/"
  bindings:
    # 回車鍵上屏按鍵序列
    Return: commit_raw_input

translator:
  dictionary: zhung
  prism: zhung_combo

editor:
  bindings:
    # 退格鍵刪除一個拼音音節
    BackSpace: back_syllable

punctuator:
  import_preset: default

key_binder:
  import_preset: default
  bindings:
    # 不用 , . 翻頁
    - { when: paging, accept: comma, send: comma }
    - { when: has_menu, accept: period, send: period }

recognizer:
  import_preset: default

__patch:
  # 使用八股文語言模型
  - grammar:/hant?
  # 用家自選配置
  - zhung_combo.custom:/patch?
