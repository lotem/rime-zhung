# Rime schema
# encoding: utf-8

schema:
  schema_id: zhung_combo
  name: 中原話宮保拼音
  version: "0.6"
  author:
    - 佛振 <chen.sst@gmail.com>
  description: |
    宮保拼音七指禪指法
    並擊輸入老派鄭州話

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
    abbrev: [ 中, Ａ ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    states: [ 漢字, 汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - chord_composer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcba'"
  initials: "zyxwvutsrqponmlkjihgfedcba"
  finals: "'"
  delimiter: " "
  algebra:
    __patch:
      - zhuan_pinyin:/zhuan_pinyin
      - zhuan_pinyin:/gungbau_shuru

chord_composer:
  alphabet: 'swxdecfrvgtbjum kilo'
  algebra:
    - 'xlit|swxdecfrvgtbjum kilo|sczhlfgdbktpiuVaNReo|'
    - 'xform/^a$/ /'
    - xform/^zfb/v/
    - xform/^zf/zh/
    - xform/^cl/ch/
    - xform/^fb/m/
    - xform/^ld/n/
    - xform/^shg(.+)$/$1/
    - xform/^hg/r/
    - xform/^g([iV])/j$1/
    - xform/^k([iV])/q$1/
    - xform/^h([iV])/x$1/
    - xform/(ua?)Ro$/$1Ne/
    - xform/iRo$/VNe/
    - xform/aR$/ai/
    - xform/ao$/ao/
    - xform/Ro$/ou/
    - xform/uR$/ui/
    - xform/iR$/iu/
    - xform/^([zcsr]h?)R$/$1i/
    - xform/^R$/er/
    - xform/Re?$/ei/
    - xform/([ai])Ne$/$1ng/
    - xform/^uNe$/weng/
    - xform/uNe$/ong/
    - xform/VNe$/iong/
    - xform/Ne$/eng/
    - xform/([aiuV])N$/$1n/
    - xform/N$/en/
    - xform/^([bpmfv])uo$/$1o/
    - xform/iae$/iai/
    - xform/^i(ng?)$/yi$1/
    - xform/^i$/yi/
    - xform/^iu/you/
    - xform/^i/y/
    - xform/^u([in])$/we$1/
    - xform/^u$/wu/
    - xform/^u/w/
    - xform/^V/yu/
    - xform/^([jqx])V/$1u/
    - xform/V/v/
    - xform/^([zcs])i$/$1yi/
    - xform/^([zcsr]h)i([aoeu])/$1$2/
    - xform/^([zcsr]h)i(ng?)$/$1e$2/
    - xform/^([bpmfv])$/$1u/
    - xform/^([dtnl])$/$1i/
    - xform/^([gkh])$/$1e/
    - xform/^([zcsr]h?)$/$1i/
  output_format:
    - "xform/^([bpm])([iu]|a|[ia]?e|o|[ae]i|i?ao|[oi]u|i?an|[ie]n|[ei]ng|ang|ong)$/$1$2'/"
    - "xform/^([fvw])([iu]|a|o|[ae]i|ao|ou|an|en|eng|ang|ong)$/$1$2'/"
    - "xform/^([dt])([iu]|i?a|[ia]?e|[iu]o|[aeu]i|i?ao|[oi]u|[iu]?an|[ue]n|[ei]ng|ang|ong)$/$1$2'/"
    - "xform/^([nl])([iuv]|i?a|[iva]?e|[iuv]?o|[aeu]i|i?ao|[oi]u|[iuv]?an|[iuve]n|[ei]ng|i?ang|i?ong)$/$1$2'/"
    - "xform/^([gkh])(u|u?a|u?a?e|uo|u?ai|[ue]i|u?ao|u?ou|u?an|[ue]n|eng|u?ang|ong)$/$1$2'/"
    - "xform/^([zcs]h?|r)([iu]|u?a|a?e|uo|u?ai|[ue]i|u?ao|u?ou|u?an|[ue]n|eng|u?ang|ong)$/$1$2'/"
    - "xform/^([jqxy])([iu]|i?ai?|[iu]?e|[iu]?o|[iu]?ao|u?ou|iu|[iu]?an|[iu]n|ing|i?ang|i?ong)$/$1$2'/"
    - "xform/^([zcs])(yi|v|[iv]e|[iv]o|[iv]ao|[iv]ou|iu|[iuv]an|[iuv]n|ing|iang|iong)$/$1$2'/"
    - "xform/^([aeo]|[ae]i|ae|ao|ou|[ae]ng?|er)$/$1'/"
    - "erase/^([A-Za-z]+)$/"
  prompt_format:
    - "xform/^(.*)$/[$1]/"
  bindings:
    # 回車鍵上屏按鍵序列
    Return: commit_raw_input

translator:
  dictionary: zhung
  prism: zhung_combo
  preedit_format:
    __patch: zhuan_pinyin:/xanshy_shengdiau

editor:
  bindings:
    # 退格鍵刪除一個拼音音節
    BackSpace: back_syllable

punctuator:
  import_preset: default

key_binder:
  import_preset: default
  bindings:
    # 不用 , . 翻頁
    - { when: paging, accept: comma, send: comma }
    - { when: has_menu, accept: period, send: period }

recognizer:
  import_preset: default

__patch:
  # 使用八股文語言模型
  - grammar:/hant?
  # 用家自選配置
  - zhung_combo.custom:/patch?
