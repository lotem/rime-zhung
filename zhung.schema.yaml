# Rime schema
# encoding: utf-8

schema:
  schema_id: zhung
  name: 中州羅馬字
  version: "0.6"
  author:
    - 佛振 <chen.sst@gmail.com>
  description: |
    老派鄭州話
    採用《中州羅馬字》拼音方案

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    states: [ 漢字, 汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - r10n_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: 'zyxwvutsrqponmlkjihgfedcba/\<>,.'
  initials: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - derive/^wu(.+)$/we$1/
    - derive/^w/v/
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/
    - derive/^rh/r/
    - derive/^([jqx])([aeou])/$1i$2/
    - derive/eo(\d?)$/oe$1/
    - derive/([aeiou])ng(\d?)$/$1gn$2/
    - derive/([iu])a(l|ng?)(\d?)$/a$1$2$3/
    - derive/^([a-z]+)\d$/$1/
    - 'xlit 1234 /\<>'
    - 'derive/^(.*)<$/$1,/'
    - 'derive/^(.*)>$/$1./'

translator:
  dictionary: zhung
  #spelling_hints: 4
  preedit_format:
    - 'xform ([aeiou])(l|ng?)([/\\<>,.]) $1$3$2'
    - 'xform ([aeo])([iu])([/\\<>,.]) $1$3$2'
    - 'xform a/ á'
    - 'xform a\\ à'
    - 'xform a[<,] â'
    - 'xform a[>.] ǎ'
    - 'xform e/ é'
    - 'xform e\\ è'
    - 'xform e[<,] ê'
    - 'xform e[>.] ě'
    - 'xform o/ ó'
    - 'xform o\\ ò'
    - 'xform o[<,] ô'
    - 'xform o[>.] ǒ'
    - 'xform i/ í'
    - 'xform i\\ ì'
    - 'xform i[<,] î'
    - 'xform i[>.] ǐ'
    - 'xform u/ ú'
    - 'xform u\\ ù'
    - 'xform u[<,] û'
    - 'xform u[>.] ǔ'
    - 'xform y/ ý'
    - 'xform y\\ ỳ'
    - 'xform y[<,] ŷ'
    - 'xform y[>.] y̌'
    - 'xform w/ ẃ'
    - 'xform w\\ ẁ'
    - 'xform w[<,] ŵ'
    - 'xform w[>.] w̌'
  comment_format:
    - xform ([aeiou])(l|ng?)([1234]) $1$3$2
    - xform ([aeo])([iu])([1234]) $1$3$2
    - xform a1 á
    - xform a2 à
    - xform a3 â
    - xform a4 ǎ
    - xform e1 é
    - xform e2 è
    - xform e3 ê
    - xform e4 ě
    - xform o1 ó
    - xform o2 ò
    - xform o3 ô
    - xform o4 ǒ
    - xform i1 í
    - xform i2 ì
    - xform i3 î
    - xform i4 ǐ
    - xform u1 ú
    - xform u2 ù
    - xform u3 û
    - xform u4 ǔ
    - xform y1 ý
    - xform y2 ỳ
    - xform y3 ŷ
    - xform y4 y̌
    - xform w1 ẃ
    - xform w2 ẁ
    - xform w3 ŵ
    - xform w4 w̌

abc_segmentor:
  extra_tags:
    - reverse_lookup

reverse_lookup:
  dictionary: cangjie5
  enable_completion: true
  prefix: "`"
  suffix: "'"
  tips: 〔倉頡〕
  preedit_format:
    - "xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜符|"
  comment_format:
    - xform ([aeiou])(l|ng?)([1234]) $1$3$2
    - xform ([aeo])([iu])([1234]) $1$3$2
    - xform a1 á
    - xform a2 à
    - xform a3 â
    - xform a4 ǎ
    - xform e1 é
    - xform e2 è
    - xform e3 ê
    - xform e4 ě
    - xform o1 ó
    - xform o2 ò
    - xform o3 ô
    - xform o4 ǒ
    - xform i1 í
    - xform i2 ì
    - xform i3 î
    - xform i4 ǐ
    - xform u1 ú
    - xform u2 ù
    - xform u3 û
    - xform u4 ǔ
    - xform y1 ý
    - xform y2 ỳ
    - xform y3 ŷ
    - xform y4 y̌
    - xform w1 ẃ
    - xform w2 ẁ
    - xform w3 ŵ
    - xform w4 w̌

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"
